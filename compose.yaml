name: xxx-development

services:
  postgres:
    image: postgres:17.10-alpine3.23
    environment:
      POSTGRES_DB: xxx
      POSTGRES_USER: xxx
      POSTGRES_PASSWORD: development-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xxx -d xxx"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8.8.0-alpine3.23
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: development-minio
      MINIO_ROOT_PASSWORD: development-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infra/minio:/config:ro
    entrypoint:
      - /bin/sh
      - -c
      - >-
        mc alias set local http://minio:9000 development-minio development-minio-secret &&
        mc mb --ignore-existing local/xxx-private-models &&
        mc anonymous set none local/xxx-private-models &&
        mc version enable local/xxx-private-models &&
        mc cors set local/xxx-private-models /config/cors.json
    restart: "no"

  mailpit:
    image: axllent/mailpit:v1.30.0
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data:
  redis-data:
  minio-data:
